<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Legends</title>
    <style>
        body {
            font-size: 16px; /* Base font size increased for better readability */
            padding: 10px;
        }
        h1 {
            font-size: 2.5em; /* Larger heading for better visibility */
        }
        button {
            padding: 15px 30px; /* Increased button size */
            font-size: 1.2em; /* Larger font size for buttons */
            margin: 10px 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        @media (min-width: 600px) {
            .container {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Chess Legends</h1>
        <button>Start Game</button>
        <button>Settings</button>
    </div>
</body>
</html>
